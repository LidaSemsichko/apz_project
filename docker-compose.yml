services:
  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    container_name: config-server
    ports:
      - "8010:8000"
    environment:
      INSTANCE_NAME: config-server
      STALE_AFTER_SECONDS: 30
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - app-network
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8000:8000"
    depends_on:
      config-server:
        condition: service_healthy
      auth-service-1:
        condition: service_started
      auth-service-2:
        condition: service_started
      catalog-service-1:
        condition: service_started
      catalog-service-2:
        condition: service_started
      reviews-service-1:
        condition: service_started
      reviews-service-2:
        condition: service_started
      feed-api-1:
        condition: service_started
      feed-api-2:
        condition: service_started
    environment:
      CONFIG_SERVER_URL: http://config-server:8000
      INSTANCE_NAME: api-gateway
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: frontend
    ports:
      - "8501:8501"
    depends_on:
      api-gateway:
        condition: service_started
    environment:
      API_GATEWAY_URL: http://api-gateway:8000
    networks:
      - app-network
    restart: unless-stopped

  auth-service-1:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: auth-service-1
    ports:
      - "8001:8000"
    depends_on:
      config-server:
        condition: service_healthy
      auth-db:
        condition: service_healthy
      redis-master:
        condition: service_healthy
      redis-sentinel-1:
        condition: service_started
      redis-sentinel-2:
        condition: service_started
      redis-sentinel-3:
        condition: service_started
    environment:
      CONFIG_SERVER_URL: http://config-server:8000
      DATABASE_URL: postgresql://${AUTH_POSTGRES_USER}:${AUTH_POSTGRES_PASSWORD}@auth-db:5432/${AUTH_POSTGRES_DB}
      REDIS_SENTINEL_HOSTS: redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
      REDIS_MASTER_NAME: mymaster
      REDIS_DB: "0"
      JWT_SECRET: ${JWT_SECRET}
      INSTANCE_NAME: auth-service-1
      PUBLIC_URL: http://auth-service-1:8000
      TOKEN_TTL_SECONDS: 3600
    networks:
      - app-network
    restart: unless-stopped

  auth-service-2:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: auth-service-2
    ports:
      - "8002:8000"
    depends_on:
      config-server:
        condition: service_healthy
      auth-db:
        condition: service_healthy
      redis-master:
        condition: service_healthy
      redis-sentinel-1:
        condition: service_started
      redis-sentinel-2:
        condition: service_started
      redis-sentinel-3:
        condition: service_started
    environment:
      CONFIG_SERVER_URL: http://config-server:8000
      DATABASE_URL: postgresql://${AUTH_POSTGRES_USER}:${AUTH_POSTGRES_PASSWORD}@auth-db:5432/${AUTH_POSTGRES_DB}
      REDIS_SENTINEL_HOSTS: redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
      REDIS_MASTER_NAME: mymaster
      REDIS_DB: "0"
      JWT_SECRET: ${JWT_SECRET}
      INSTANCE_NAME: auth-service-2
      PUBLIC_URL: http://auth-service-2:8000
      TOKEN_TTL_SECONDS: 3600
    networks:
      - app-network
    restart: unless-stopped

  catalog-service-1:
    build:
      context: .
      dockerfile: catalog-service/Dockerfile
    container_name: catalog-service-1
    ports:
      - "8003:8000"
    depends_on:
      config-server:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
    environment:
      CONFIG_SERVER_URL: http://config-server:8000
      INSTANCE_NAME: catalog-service-1
      PUBLIC_URL: http://catalog-service-1:8000
      MONGO_URL: mongodb://mongo1:27017,mongo2:27017,mongo3:27017/catalog_db?replicaSet=rs0
    networks:
      - app-network
    restart: unless-stopped

  catalog-service-2:
    build:
      context: .
      dockerfile: catalog-service/Dockerfile
    container_name: catalog-service-2
    ports:
      - "8013:8000"
    depends_on:
      config-server:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
    environment:
      CONFIG_SERVER_URL: http://config-server:8000
      INSTANCE_NAME: catalog-service-2
      PUBLIC_URL: http://catalog-service-2:8000
      MONGO_URL: mongodb://mongo1:27017,mongo2:27017,mongo3:27017/catalog_db?replicaSet=rs0
    networks:
      - app-network
    restart: unless-stopped

  reviews-service-1:
    build:
      context: .
      dockerfile: reviews-service/Dockerfile
    container_name: reviews-service-1
    ports:
      - "8004:8000"
    depends_on:
      config-server:
        condition: service_healthy
      reviews-db:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URL: http://config-server:8000
      DATABASE_URL: postgresql://${REVIEWS_POSTGRES_USER}:${REVIEWS_POSTGRES_PASSWORD}@reviews-db:5432/${REVIEWS_POSTGRES_DB}
      INSTANCE_NAME: reviews-service-1
      PUBLIC_URL: http://reviews-service-1:8000
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: review.created
    networks:
      - app-network
    restart: unless-stopped

  reviews-service-2:
    build:
      context: .
      dockerfile: reviews-service/Dockerfile
    container_name: reviews-service-2
    ports:
      - "8014:8000"
    depends_on:
      config-server:
        condition: service_healthy
      reviews-db:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URL: http://config-server:8000
      DATABASE_URL: postgresql://${REVIEWS_POSTGRES_USER}:${REVIEWS_POSTGRES_PASSWORD}@reviews-db:5432/${REVIEWS_POSTGRES_DB}
      INSTANCE_NAME: reviews-service-2
      PUBLIC_URL: http://reviews-service-2:8000
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: review.created
    networks:
      - app-network
    restart: unless-stopped

  reviews-outbox-publisher-1:
    build:
      context: .
      dockerfile: reviews-service/Dockerfile
    container_name: reviews-outbox-publisher-1
    command: ["python", "-m", "app.outbox_publisher"]
    depends_on:
      reviews-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${REVIEWS_POSTGRES_USER}:${REVIEWS_POSTGRES_PASSWORD}@reviews-db:5432/${REVIEWS_POSTGRES_DB}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: review.created
      INSTANCE_NAME: reviews-outbox-publisher-1
    networks:
      - app-network
    restart: unless-stopped

  reviews-outbox-publisher-2:
    build:
      context: .
      dockerfile: reviews-service/Dockerfile
    container_name: reviews-outbox-publisher-2
    command: ["python", "-m", "app.outbox_publisher"]
    depends_on:
      reviews-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${REVIEWS_POSTGRES_USER}:${REVIEWS_POSTGRES_PASSWORD}@reviews-db:5432/${REVIEWS_POSTGRES_DB}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: review.created
      INSTANCE_NAME: reviews-outbox-publisher-2
    networks:
      - app-network
    restart: unless-stopped

  feed-api-1:
    build:
      context: .
      dockerfile: feed-service/Dockerfile
    container_name: feed-api-1
    ports:
      - "8005:8000"
    depends_on:
      config-server:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URL: http://config-server:8000
      INSTANCE_NAME: feed-api-1
      PUBLIC_URL: http://feed-api-1:8000
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
    networks:
      - app-network
    restart: unless-stopped

  feed-api-2:
    build:
      context: .
      dockerfile: feed-service/Dockerfile
    container_name: feed-api-2
    ports:
      - "8015:8000"
    depends_on:
      config-server:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URL: http://config-server:8000
      INSTANCE_NAME: feed-api-2
      PUBLIC_URL: http://feed-api-2:8000
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
    networks:
      - app-network
    restart: unless-stopped

  feed-consumer-1:
    build:
      context: .
      dockerfile: feed-service/Dockerfile
    container_name: feed-consumer-1
    command: ["python", "-m", "app.kafka_consumer"]
    depends_on:
      neo4j:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      INSTANCE_NAME: feed-consumer-1
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: review.created
    networks:
      - app-network
    restart: unless-stopped

  feed-consumer-2:
    build:
      context: .
      dockerfile: feed-service/Dockerfile
    container_name: feed-consumer-2
    command: ["python", "-m", "app.kafka_consumer"]
    depends_on:
      neo4j:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      INSTANCE_NAME: feed-consumer-2
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: review.created
    networks:
      - app-network
    restart: unless-stopped

  auth-db:
    image: postgres:15
    container_name: auth-db
    environment:
      POSTGRES_USER: ${AUTH_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AUTH_POSTGRES_PASSWORD}
      POSTGRES_DB: ${AUTH_POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - auth_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_POSTGRES_USER} -d ${AUTH_POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app-network
    restart: unless-stopped

  reviews-db:
    image: postgres:15
    container_name: reviews-db
    environment:
      POSTGRES_USER: ${REVIEWS_POSTGRES_USER}
      POSTGRES_PASSWORD: ${REVIEWS_POSTGRES_PASSWORD}
      POSTGRES_DB: ${REVIEWS_POSTGRES_DB}
    ports:
      - "5434:5432"
    volumes:
      - reviews_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${REVIEWS_POSTGRES_USER} -d ${REVIEWS_POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app-network
    restart: unless-stopped

  redis-master:
    image: redis:7
    container_name: redis-master
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --replica-announce-ip
      - "172.28.0.10"
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      app-network:
        ipv4_address: 172.28.0.10
    restart: unless-stopped

  redis-replica-1:
    image: redis:7
    container_name: redis-replica-1
    depends_on:
      redis-master:
        condition: service_healthy
    command:
      - redis-server
      - --replicaof
      - "172.28.0.10"
      - "6379"
      - --replica-announce-ip
      - "172.28.0.11"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      app-network:
        ipv4_address: 172.28.0.11
    restart: unless-stopped

  redis-replica-2:
    image: redis:7
    container_name: redis-replica-2
    depends_on:
      redis-master:
        condition: service_healthy
    command:
      - redis-server
      - --replicaof
      - "172.28.0.10"
      - "6379"
      - --replica-announce-ip
      - "172.28.0.12"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      app-network:
        ipv4_address: 172.28.0.12
    restart: unless-stopped

  redis-sentinel-1:
    image: redis:7
    container_name: redis-sentinel-1
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica-1:
        condition: service_started
      redis-replica-2:
        condition: service_started
    entrypoint: ["sh", "-c"]
    command:
      - |
        cat > /tmp/sentinel.conf <<CFG
        port 26379
        sentinel monitor mymaster 172.28.0.10 6379 2
        sentinel down-after-milliseconds mymaster 5000
        sentinel failover-timeout mymaster 10000
        sentinel parallel-syncs mymaster 1
        CFG
        # Raise the TILT-trigger threshold from the 2-second default to 10s.
        #
        # Why: on Docker Desktop / WSL2 the host occasionally suspends or
        # de-prioritises the VM, which pauses the container clock for several
        # seconds. Sentinel measures the gap between its own timer iterations
        # and enters TILT mode (30-second safe-mode that refuses to perform
        # failover) any time that gap exceeds the trigger threshold. With the
        # 2s default Sentinel was tilting constantly on this host and could
        # never complete a failover. 10s is permissive enough to ride out the
        # host's stalls while still catching real clock skew.

        ( sleep 5 && redis-cli -p 26379 SENTINEL DEBUG tilt-trigger 10000 >/dev/null 2>&1 ) &
        exec redis-sentinel /tmp/sentinel.conf
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - app-network
    restart: unless-stopped

  redis-sentinel-2:
    image: redis:7
    container_name: redis-sentinel-2
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica-1:
        condition: service_started
      redis-replica-2:
        condition: service_started
    entrypoint: ["sh", "-c"]
    command:
      - |
        cat > /tmp/sentinel.conf <<CFG
        port 26379
        sentinel monitor mymaster 172.28.0.10 6379 2
        sentinel down-after-milliseconds mymaster 5000
        sentinel failover-timeout mymaster 10000
        sentinel parallel-syncs mymaster 1
        CFG
        # Raise the TILT-trigger threshold from the 2-second default to 10s.
        #
        # Why: on Docker Desktop / WSL2 the host occasionally suspends or
        # de-prioritises the VM, which pauses the container clock for several
        # seconds. Sentinel measures the gap between its own timer iterations
        # and enters TILT mode (30-second safe-mode that refuses to perform
        # failover) any time that gap exceeds the trigger threshold. With the
        # 2s default Sentinel was tilting constantly on this host and could
        # never complete a failover. 10s is permissive enough to ride out the
        # host's stalls while still catching real clock skew.

        ( sleep 5 && redis-cli -p 26379 SENTINEL DEBUG tilt-trigger 10000 >/dev/null 2>&1 ) &
        exec redis-sentinel /tmp/sentinel.conf
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - app-network
    restart: unless-stopped

  redis-sentinel-3:
    image: redis:7
    container_name: redis-sentinel-3
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica-1:
        condition: service_started
      redis-replica-2:
        condition: service_started
    entrypoint: ["sh", "-c"]
    command:
      - |
        cat > /tmp/sentinel.conf <<CFG
        port 26379
        sentinel monitor mymaster 172.28.0.10 6379 2
        sentinel down-after-milliseconds mymaster 5000
        sentinel failover-timeout mymaster 10000
        sentinel parallel-syncs mymaster 1
        CFG
        # Raise the TILT-trigger threshold from the 2-second default to 10s.
        #
        # Why: on Docker Desktop / WSL2 the host occasionally suspends or
        # de-prioritises the VM, which pauses the container clock for several
        # seconds. Sentinel measures the gap between its own timer iterations
        # and enters TILT mode (30-second safe-mode that refuses to perform
        # failover) any time that gap exceeds the trigger threshold. With the
        # 2s default Sentinel was tilting constantly on this host and could
        # never complete a failover. 10s is permissive enough to ride out the
        # host's stalls while still catching real clock skew.

        ( sleep 5 && redis-cli -p 26379 SENTINEL DEBUG tilt-trigger 10000 >/dev/null 2>&1 ) &
        exec redis-sentinel /tmp/sentinel.conf
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - app-network
    restart: unless-stopped

  mongo1:
    image: mongo:7
    container_name: mongo1
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo1_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 15s
    networks:
      - app-network
    restart: unless-stopped

  mongo2:
    image: mongo:7
    container_name: mongo2
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27018:27017"
    volumes:
      - mongo2_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 15s
    networks:
      - app-network
    restart: unless-stopped

  mongo3:
    image: mongo:7
    container_name: mongo3
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27019:27017"
    volumes:
      - mongo3_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 15s
    networks:
      - app-network
    restart: unless-stopped

  mongo-init:
    image: mongo:7
    container_name: mongo-init
    depends_on:
      mongo1:
        condition: service_healthy
      mongo2:
        condition: service_healthy
      mongo3:
        condition: service_healthy
    restart: "no"
    entrypoint: ["bash", "-c"]
    command:
      - |
        set -e
        echo "[mongo-init] Checking replica set status..."
        STATUS=$$(mongosh --quiet --host mongo1:27017 --eval "try { rs.status().ok } catch (e) { print(0) }")
        if [ "$$STATUS" = "1" ]; then
          echo "[mongo-init] Replica set already initialised - nothing to do."
          exit 0
        fi
        echo "[mongo-init] Initialising replica set rs0..."
        mongosh --quiet --host mongo1:27017 --eval '
          rs.initiate({
            _id: "rs0",
            members: [
              { _id: 0, host: "mongo1:27017" },
              { _id: 1, host: "mongo2:27017" },
              { _id: 2, host: "mongo3:27017" }
            ]
          })
        '
        echo "[mongo-init] Waiting for PRIMARY election..."
        for i in $$(seq 1 30); do
          PRIMARY=$$(mongosh --quiet --host mongo1:27017 --eval "try { rs.status().members.filter(function(m){return m.stateStr==='PRIMARY'}).length } catch (e) { print(0) }")
          if [ "$$PRIMARY" = "1" ]; then
            echo "[mongo-init] PRIMARY elected. Replica set is ready."
            exit 0
          fi
          sleep 2
        done
        echo "[mongo-init] ERROR: no PRIMARY after 60s"
        exit 1
    networks:
      - app-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep -q imok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app-network
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks:
      - app-network
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    container_name: neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    networks:
      - app-network
    restart: unless-stopped

volumes:
  auth_pgdata:
  reviews_pgdata:
  mongo1_data:
  mongo2_data:
  mongo3_data:
  neo4j_data:

networks:
  app-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
          # Reserved static IPs (see redis-master / redis-replica-{1,2}):
          #   172.28.0.10  redis-master
          #   172.28.0.11  redis-replica-1
          #   172.28.0.12  redis-replica-2
          # All other containers get dynamic IPs from this subnet.
