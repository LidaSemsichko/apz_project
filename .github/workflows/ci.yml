name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compose-config:
    name: Validate docker-compose.yml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint compose file
        run: docker compose config --quiet

  python-syntax:
    name: Python syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Byte-compile all services
        run: |
          python -m compileall -q \
            api-gateway/app \
            auth-service/app \
            catalog-service/app \
            reviews-service/app \
            feed-service/app \
            frontend

  docker-build:
    name: Build ${{ matrix.service }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - catalog-service
          - reviews-service
          - feed-service
          - frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: false
          tags: ${{ matrix.service }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
