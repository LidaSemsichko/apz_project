name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compose-config:
    name: Validate docker-compose.yml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Provide .env for compose interpolation
        run: cp .env.example .env
      - name: Lint compose file (fail on unset env vars)
        run: |
          output=$(docker compose config 2>&1)
          echo "$output"
          if echo "$output" | grep -i "is not set"; then
            echo "::error::docker-compose.yml references a variable that is not declared in .env.example"
            exit 1
          fi
          docker compose config --quiet

  python-syntax:
    name: Python syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Byte-compile all services
        run: |
          python -m compileall -q \
            common \
            config-server/app \
            api-gateway/app \
            auth-service/app \
            catalog-service/app \
            reviews-service/app \
            feed-service/app \
            frontend

  docker-build:
    name: Build ${{ matrix.service }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - config-server
          - auth-service
          - catalog-service
          - reviews-service
          - feed-service
          - frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.service }}/Dockerfile
          push: false
          tags: ${{ matrix.service }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
